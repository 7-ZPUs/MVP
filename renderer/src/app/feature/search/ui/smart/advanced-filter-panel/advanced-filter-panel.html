<div class="filter-panel" [class.collapsed]="!isExpanded">
  <div class="panel-header" (click)="togglePanel()">
    <h3>Filtri Avanzati</h3>
    <button type="button">{{ isExpanded ? 'Comprimi' : 'Espandi' }}</button>
  </div>

  <div class="panel-body" *ngIf="isExpanded">
    <div class="error-banner" *ngIf="externalValidation && !externalValidation.isValid">
      Attenzione: i filtri contengono errori. Ricontrolla i campi evidenziati.
    </div>

    <form [formGroup]="panelForm" (ngSubmit)="onSubmit()">
      <div class="filter-section">
        <h4>Comuni</h4>
        <app-common-filters
          [filters]="$any(filters.common || {})"
          [validationResult]="currentValidationResult"
          (filtersChanged)="onCommonFiltersChanged($event)"
        >
        </app-common-filters>
      </div>

      <div class="filter-section">
        <h4>Dati Documento (DiDai)</h4>
        <app-di-dai-filters
          [filters]="$any(filters.diDai || {})"
          [validationResult]="currentValidationResult"
          (filtersChanged)="onDiDaiFiltersChanged($event)"
        >
        </app-di-dai-filters>
      </div>

      <div class="filter-section">
        <h4>Dati di Aggregazione</h4>
        <app-aggregate-filters
          [filters]="$any(filters.aggregate || {})"
          [validationResult]="currentValidationResult"
          (filtersChanged)="onAggregateFiltersChanged($event)"
        >
        </app-aggregate-filters>
      </div>

      <div class="filter-section">
        <app-custom-meta-filters
          [filters]="$any(filters.customMeta || [])"
          [validationResult]="currentValidationResult"
          (filtersChanged)="onEntriesChanged($event)"
        >
        </app-custom-meta-filters>
      </div>

      <div class="filter-section">
        <app-subject-filters
          [subject]="filters.subject || null"
          [resetCounter]="subjectResetCounter"
          [strategyRegistry]="strategyRegistry"
          (subjectChanged)="onSubjectChanged($event)"
        >
        </app-subject-filters>
      </div>

      <div class="form-actions">
        <button type="button" (click)="onReset()">Svuota Filtri</button>
        <button type="submit" [disabled]="currentValidationResult?.isValid === false">
          Applica e Cerca
        </button>
      </div>
    </form>
  </div>
</div>
