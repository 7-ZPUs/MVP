<div
  class="aggregate-filters-container"
  [formGroup]="form"
  style="display: flex; flex-direction: column; gap: 0.5rem"
>
  <details
    class="filter-accordion"
    closed
    [attr.open]="getError('dataApertura') ? '' : null"
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem">Dati Aggregazione</summary>

    <div style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem">
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Tipo Aggregazione</label>
          <select
            formControlName="tipoAggregazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutte</option>
            <option *ngFor="let t of aggregationTypes" [ngValue]="t">{{ t }}</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">ID Aggregazione</label>
          <input
            type="text"
            formControlName="idAggregazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Data Apertura</label>
          <input
            type="date"
            formControlName="dataApertura"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
            [attr.aria-invalid]="!!getError('dataApertura')"
          />
          <div
            *ngIf="getError('dataApertura') as err"
            class="validation-error"
            style="color: #dc2626; font-size: 0.75rem; margin-top: 0.25rem"
          >
            {{ err.message }}
          </div>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Data Chiusura</label>
          <input
            type="date"
            formControlName="dataChiusura"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>
    </div>
  </details>

  <details
    class="filter-accordion"
    [attr.open]="hasProcedimentoFasiErrors() ? '' : null"
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem">Procedimento</summary>

    <div
      formGroupName="procedimento"
      style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem"
    >
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Materia</label>
          <input
            type="text"
            formControlName="materia"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Codice URI (Catalogo)</label>
          <input
            type="text"
            formControlName="URICatalogo"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 1rem">
        <label style="display: block; font-size: 0.875rem">Denominazione Procedimento</label>
        <input
          type="text"
          formControlName="denominazioneProcedimento"
          style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
        />
      </div>

      <div style="margin-top: 1rem; padding: 0.5rem; background: #f8fafc; border-radius: 4px">
        <p style="font-weight: 600; font-size: 0.875rem; margin-bottom: 0.5rem">
          Fasi del Procedimento
        </p>
        <div formArrayName="fasi">
          <div
            *ngFor="let fase of fasiFormArray.controls; let i = index"
            [formGroupName]="i"
            style="
              border: 1px dashed #94a3b8;
              padding: 1rem;
              margin-bottom: 0.5rem;
              position: relative;
              background: white;
            "
          >
            <button
              type="button"
              (click)="removeFase(i)"
              style="
                position: absolute;
                right: 0.5rem;
                top: 0.5rem;
                color: #dc2626;
                border: none;
                background: none;
                cursor: pointer;
                font-weight: bold;
              "
            >
              ✕
            </button>

            <div class="form-group" style="margin-bottom: 0.5rem">
              <label style="display: block; font-size: 0.75rem">Tipo Fase</label>
              <select formControlName="tipoFase" style="width: 100%; padding: 0.25rem">
                <option [ngValue]="null">Seleziona...</option>
                <option *ngFor="let ft of faseTypes" [ngValue]="ft">{{ ft }}</option>
              </select>
            </div>
            <div class="form-row" style="display: flex; gap: 0.5rem">
              <div style="flex: 1">
                <label style="display: block; font-size: 0.75rem">Inizio Fase</label>
                <input
                  type="date"
                  formControlName="dataInizioFase"
                  style="width: 100%; padding: 0.25rem"
                  [attr.aria-invalid]="!!getFaseError(i, 'dataInizioFase')"
                />
                <div
                  *ngIf="getFaseError(i, 'dataInizioFase') as err"
                  class="validation-error"
                  style="color: #dc2626; font-size: 0.75rem; margin-top: 0.25rem"
                >
                  {{ err.message }}
                </div>
              </div>
              <div style="flex: 1">
                <label style="display: block; font-size: 0.75rem">Fine Fase</label>
                <input
                  type="date"
                  formControlName="dataFineFase"
                  style="width: 100%; padding: 0.25rem"
                />
              </div>
            </div>
          </div>
        </div>
        <button
          type="button"
          (click)="addFase()"
          style="
            margin-top: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          + Aggiungi Fase
        </button>
      </div>
    </div>
  </details>

  <details
    class="filter-accordion"
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem">Assegnazione</summary>

    <div
      formGroupName="assegnazione"
      style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem"
    >
      <div class="form-group" style="margin-bottom: 1rem">
        <label style="display: block; font-size: 0.875rem">Tipo Assegnazione</label>
        <select
          formControlName="tipoAssegnazione"
          style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
        >
          <option [ngValue]="null">Tutte</option>
          <option *ngFor="let a of assegnazioneTypes" [ngValue]="a">{{ a }}</option>
        </select>
      </div>
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Data Inizio</label>
          <input
            type="date"
            formControlName="dataInizioAssegn"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
            [attr.aria-invalid]="!!getError('assegnazione.dataInizioAssegn')"
          />
          <div
            *ngIf="getError('assegnazione.dataInizioAssegn') as err"
            class="validation-error"
            style="color: #dc2626; font-size: 0.75rem; margin-top: 0.25rem"
          >
            {{ err.message }}
          </div>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem">Data Fine</label>
          <input
            type="date"
            formControlName="dataFineAssegn"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>
    </div>
  </details>
</div>
