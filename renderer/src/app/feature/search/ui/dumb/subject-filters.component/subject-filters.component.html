<fieldset class="filter-fieldset subject-wizard">
  <legend>Filtri Soggetto</legend>

  <div *ngIf="subjectsList().length > 0" class="subject-list">
    <div *ngFor="let subj of subjectsList(); let i = index" class="subject-list-item">
      <div>
        <strong>{{ subj.role }}</strong> <span class="subject-type">({{ subj.type }})</span>
      </div>
      <button type="button" (click)="removeSubject(i)" class="btn-remove-text">✕ Rimuovi</button>
    </div>
  </div>

  <div *ngIf="currentStep() === 0">
    <button
      type="button"
      data-testid="add-subject-button"
      class="btn-outline btn-dashed"
      (click)="startWizard()"
      style="width: 100%; padding: 1rem; text-align: center"
    >
      + Aggiungi nuovo Soggetto
    </button>
  </div>

  <div *ngIf="currentStep() === 1" class="wizard-step slide-in">
    <h4>1. Seleziona il Ruolo</h4>
    <div class="button-grid">
      <button
        *ngFor="let item of availableRoles()"
        type="button"
        class="btn-choice"
        (click)="setRole(item.key)"
      >
        {{ item.label }}
      </button>
    </div>

    <div class="wizard-actions step-1">
      <button type="button" class="btn-outline text-danger" (click)="resetWizard()">
        Annulla soggetto
      </button>
    </div>
  </div>

  <div *ngIf="currentStep() === 2" class="wizard-step slide-in">
    <h4>2. Seleziona il Tipo di Soggetto ({{ selectedRole() }})</h4>
    <div class="button-grid">
      <button
        *ngFor="let type of allowedTypes()"
        type="button"
        class="btn-choice"
        (click)="setType(type)"
      >
        {{ type }}
      </button>
    </div>

    <div class="wizard-actions step-2">
      <button type="button" class="btn-outline" (click)="prevStep()">← Indietro</button>
      <button type="button" class="btn-outline text-danger" (click)="resetWizard()">
        Annulla soggetto
      </button>
    </div>
  </div>

  <div *ngIf="currentStep() === 3" class="wizard-step slide-in">
    <h4>3. Dettagli ({{ selectedRole() }} - {{ selectedType() }})</h4>

    <app-subject-detail-form
      [subjectType]="selectedType()"
      [details]="currentDetails()"
      (detailsChanged)="onDetailsChanged($event)"
    >
    </app-subject-detail-form>

    <div class="wizard-actions step-3">
      <div class="action-group">
        <button type="button" class="btn-outline" (click)="prevStep()">← Cambia Tipo</button>
        <button type="button" class="btn-outline text-danger" (click)="resetWizard()">
          Annulla soggetto
        </button>
      </div>
      <button
        type="button"
        class="btn-primary"
        (click)="addSubjectToList()"
        [disabled]="!currentDetails()"
      >
        + Aggiungi all'elenco
      </button>
    </div>
  </div>
</fieldset>
