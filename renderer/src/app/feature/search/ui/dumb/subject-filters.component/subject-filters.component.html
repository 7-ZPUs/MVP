<fieldset class="filter-fieldset subject-wizard">
  <legend>Filtri Soggetto</legend>

  <div *ngIf="subjectsList().length > 0" style="margin-bottom: 1rem;">
    <div *ngFor="let subj of subjectsList(); let i = index" 
         style="display: flex; justify-content: space-between; background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; align-items: center;">
      <div>
        <strong>{{ subj.role }}</strong> <span style="color: #64748b; font-size: 0.9em;">({{ subj.type }})</span>
      </div>
      <button type="button" (click)="removeSubject(i)" style="background: none; border: none; color: #ef4444; cursor: pointer; font-weight: bold;">
        ✕ Rimuovi
      </button>
    </div>
  </div>

  <div *ngIf="currentStep() === 0">
    <button type="button" class="btn-outline" (click)="startWizard()" style="width: 100%; border: 1px dashed #cbd5e1; padding: 0.75rem;">
      + Aggiungi nuovo Soggetto
    </button>
  </div>

  <div *ngIf="currentStep() === 1" class="wizard-step slide-in">
    <h4>1. Seleziona il Ruolo</h4>
    <div class="button-grid">
      <button type="button" class="btn-choice" (click)="setRole(RoleType.AUTORE)">Produttore</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.DESTINATARIO)">Destinatario</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.OPERATORE)">Responsabile</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.ASSEGNATARIO)">Assegnatario</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.REGISTRAZIONE)">Registrazione</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.ALTRO)">Altro</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.RGD)">Resp. Gestione Documentale</button>
      <button type="button" class="btn-choice" (click)="setRole(RoleType.RSP)">Resp. Servizio Protocollo</button>
    </div>
    <div class="wizard-actions mt-2">
      <button type="button" class="btn-outline text-danger" (click)="resetWizard()">Annulla</button>
    </div>
  </div>

  <div *ngIf="currentStep() === 2" class="wizard-step slide-in">
    <h4>2. Seleziona il Tipo di Soggetto ({{ selectedRole() }})</h4>
    <div class="button-grid">
      <button type="button" class="btn-choice" (click)="setType(SubjType.PAI)">PAI (Amm. Interna)</button>
      <button type="button" class="btn-choice" (click)="setType(SubjType.PAE)">PAE (Amm. Esterna)</button>
      <button type="button" class="btn-choice" (click)="setType(SubjType.PG)">PG (Persona Giuridica)</button>
      <button type="button" class="btn-choice" (click)="setType(SubjType.PF)">PF (Persona Fisica)</button>
    </div>
    <div class="wizard-actions mt-2">
      <button type="button" class="btn-outline" (click)="prevStep()">← Indietro</button>
      <button type="button" class="btn-outline text-danger" (click)="resetWizard()">Annulla</button>
    </div>
  </div>

  <div *ngIf="currentStep() === 3" class="wizard-step slide-in">
    <h4>3. Dettagli ({{ selectedRole() }} - {{ selectedType() }})</h4>

    <app-subject-detail-form
      [subjectType]="selectedType()"
      [details]="currentDetails()"
      (detailsChanged)="onDetailsChanged($event)"
    >
    </app-subject-detail-form>

    <div class="wizard-actions mt-3" style="display: flex; gap: 0.5rem; justify-content: space-between;">
      <div>
        <button type="button" class="btn-outline" (click)="prevStep()">← Cambia Tipo</button>
        <button type="button" class="btn-outline text-danger" (click)="resetWizard()">Annulla</button>
      </div>
      <button type="button" class="btn-primary" (click)="addSubjectToList()" 
              [disabled]="!currentDetails()" 
              style="background: #3b82f6; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">
        + Aggiungi all'elenco
      </button>
    </div>
  </div>
</fieldset>
