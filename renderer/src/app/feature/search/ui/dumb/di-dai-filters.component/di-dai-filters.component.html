<fieldset 
  [disabled]="disabled"
  class="didai-filters-container"
  [formGroup]="form"
  style="display: flex; flex-direction: column; gap: 0.5rem"
>
  <details
    class="filter-accordion"
    closed
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem; user-select: none">
      Registrazione
    </summary>

    <div
      formGroupName="registrazione"
      style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem"
    >
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Tipologia Flusso</label
          >
          <select
            formControlName="tipologiaFlusso"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option *ngFor="let f of flowTypes" [ngValue]="f">{{ f }}</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Tipologia Registro</label
          >
          <select
            formControlName="tipologiaRegistro"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option *ngFor="let r of registerTypes" [ngValue]="r">{{ r }}</option>
          </select>
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Data Registrazione</label
          >
          <input
            type="date"
            formControlName="dataRegistrazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
            [attr.aria-invalid]="!!getError('registrazione.dataRegistrazione')"
          />
          <div
            *ngIf="getError('registrazione.dataRegistrazione') as err"
            class="validation-error"
            style="color: #dc2626; font-size: 0.75rem; margin-top: 0.25rem"
          >
            {{ err.message }}
          </div>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Ora Registrazione</label
          >
          <input
            type="time"
            formControlName="oraRegistrazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Numero Registrazione</label
          >
          <input
            type="number"
            formControlName="numeroRegistrazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Codice Registro</label
          >
          <input
            type="text"
            formControlName="codiceRegistro"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>
    </div>
  </details>

  <details
    class="filter-accordion"
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem; user-select: none">
      Dati Base (DiDai)
    </summary>

    <div style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem">
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Tipologia (Stringa)</label
          >
          <input
            type="text"
            formControlName="tipologia"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Modalità Formazione</label
          >
          <select
            formControlName="modalitaFormazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutte</option>
            <option *ngFor="let m of didaiFormations" [ngValue]="m">{{ m }}</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Riservatezza</label
          >
          <select
            formControlName="riservatezza"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option [ngValue]="true">Sì</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem">Nome</label>
          <input
            type="text"
            formControlName="nome"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Versione</label
          >
          <input
            type="text"
            formControlName="versione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >ID Primario</label
          >
          <input
            type="text"
            formControlName="idPrimario"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>
    </div>
  </details>

  <details
    class="filter-accordion"
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem; user-select: none">
      Identificativo Formato
    </summary>

    <div
      formGroupName="identificativoFormato"
      style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem"
    >
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Formato (AGID)</label
          >
          <select
            formControlName="formato"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option *ngFor="let a of agidFormats" [ngValue]="a">{{ a }}</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Nome Prodotto Creazione</label
          >
          <input
            type="text"
            formControlName="nomeProdottoCreazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Versione Prodotto</label
          >
          <input
            type="text"
            formControlName="versioneProdottoCreazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Produttore Prodotto</label
          >
          <input
            type="text"
            formControlName="produttoreProdottoCreazione"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          />
        </div>
      </div>
    </div>
  </details>

  <details
    class="filter-accordion"
    style="border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; background: white"
  >
    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem; user-select: none">
      Dati Verifica
    </summary>

    <div
      formGroupName="verifica"
      style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem"
    >
      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Formato Digitalmente</label
          >
          <select
            formControlName="formatoDigitalmente"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option [ngValue]="true">Sì</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Sigillato Elettronicamente</label
          >
          <select
            formControlName="sigillatoElettr"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option [ngValue]="true">Sì</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem">
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Marcatura Temporale</label
          >
          <select
            formControlName="marcaturaTemporale"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option [ngValue]="true">Sì</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1">
          <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
            >Conformità Copie</label
          >
          <select
            formControlName="conformitaCopie"
            style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
          >
            <option [ngValue]="null">Tutti</option>
            <option [ngValue]="true">Sì</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
      </div>
    </div>

    <summary style="font-weight: bold; cursor: pointer; padding: 0.5rem; user-select: none">
      Tracciature Modifiche
    </summary>

    <div style="padding: 1rem 0.5rem 0 0.5rem; border-top: 1px solid #e2e8f0; margin-top: 0.5rem">
      <div formArrayName="tracciatureModifiche">
        <div
          *ngFor="let tracciatura of tracciatureFormArray.controls; let i = index"
          [formGroupName]="i"
          style="
            border: 1px dashed #94a3b8;
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
            background-color: #f8fafc;
          "
        >
          <button
            type="button"
            (click)="removeTracciatura(i)"
            style="
              position: absolute;
              top: 0.5rem;
              right: 0.5rem;
              background: none;
              border: none;
              color: #dc2626;
              font-weight: bold;
              cursor: pointer;
              padding: 0.25rem;
            "
          >
            ✕ Rimuovi
          </button>

          <div
            class="form-row"
            style="display: flex; gap: 1rem; margin-bottom: 1rem; margin-top: 0.5rem"
          >
            <div class="form-group" style="flex: 1">
              <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
                >Tipo Modifica</label
              >
              <select
                formControlName="tipoModifica"
                style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
              >
                <option [ngValue]="null">Tutte</option>
                <option *ngFor="let t of modificationTypes" [ngValue]="t">{{ t }}</option>
              </select>
            </div>
            <div class="form-group" style="flex: 1">
              <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
                >Data Modifica</label
              >
              <input
                type="date"
                formControlName="dataModifica"
                style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
                [attr.aria-invalid]="!!getTracciaturaError(i, 'dataModifica')"
              />
              <div
                *ngIf="getTracciaturaError(i, 'dataModifica') as err"
                class="validation-error"
                style="color: #dc2626; font-size: 0.75rem; margin-top: 0.25rem"
              >
                {{ err.message }}
              </div>
            </div>
          </div>

          <div class="form-row" style="display: flex; gap: 1rem">
            <div class="form-group" style="flex: 1">
              <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
                >Ora Modifica</label
              >
              <input
                type="time"
                formControlName="oraModifica"
                style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
              />
            </div>
            <div class="form-group" style="flex: 1">
              <label style="display: block; font-size: 0.875rem; margin-bottom: 0.25rem"
                >ID Versione Precedente</label
              >
              <input
                type="text"
                formControlName="idVersionePrec"
                style="width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px"
              />
            </div>
          </div>
        </div>
      </div>

      <button
        type="button"
        (click)="addTracciatura()"
        style="
          padding: 0.5rem 1rem;
          background-color: #3b82f6;
          color: white;
          border: none;
          border-radius: 4px;
          font-weight: 500;
          cursor: pointer;
        "
      >
        + Aggiungi Filtro Modifica
      </button>
    </div>
  </details>
</fieldset>
