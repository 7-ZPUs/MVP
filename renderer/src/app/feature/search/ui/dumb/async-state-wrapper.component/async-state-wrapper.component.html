<div
  class="async-wrapper-container"
  style="position: relative; width: 100%; height: 100%; min-height: 100px"
>
  <div
    *ngIf="isLoading"
    class="async-loading-state"
    style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
    "
  >
    <div
      class="spinner"
      style="
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      "
    ></div>
    <p style="margin-top: 1rem; color: #64748b; font-weight: 500">{{ loadingMessage }}</p>

    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>

  <div
    *ngIf="error && !isLoading"
    class="async-error-state"
    style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      color: #dc2626;
      text-align: center;
    "
  >
    <i
      class="bi bi-exclamation-triangle-fill"
      style="font-size: 2rem; margin-bottom: 0.5rem"
      aria-hidden="true"
    ></i>
    <h4 style="margin: 0 0 0.5rem 0">Errore di caricamento</h4>
    <p style="margin: 0 0 1.5rem 0">{{ error.message || fallbackErrorMessage }}</p>

    <button
      type="button"
      class="btn-retry"
      (click)="onRetry()"
      style="
        padding: 0.5rem 1rem;
        background: #dc2626;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      "
    >
      Riprova
    </button>
  </div>

  <div *ngIf="!isLoading && !error" class="async-content-state">
    <ng-content></ng-content>
  </div>
</div>
