<div
  class="result-card class-card"
  role="button"
  tabindex="0"
  (click)="onSelectAction(result)"
  (keydown.enter)="onSelectAction(result)"
  (keydown.space)="onSelectAction(result); $event.preventDefault()"
>
  <div class="card-icon">🏷️</div>
  <div class="card-content">
    <h3 class="document-name">{{ result.name || 'Classe senza titolo' }}</h3>
    <span class="document-id">UUID Classe: {{ result.uuid }}</span>
  </div>
  <div class="card-meta">
    <span class="badge class-badge">CLASSE</span>
  </div>
  <span class="integrity-badge-base" [ngClass]="result.integrityStatus | integrityClass">
    {{ result.integrityStatus }}
  </span>
</div>
