<div class="import-layout">

  <aside class="dip-sidebar" 
         role="navigation" 
         aria-label="Navigazione albero DIP">
    <h2>Albero DIP</h2>
    <app-dip-tree (nodeSelected)="onNodeSelected($event)"></app-dip-tree>
  </aside>

  <main class="dip-main" 
        role="main" 
        [attr.aria-busy]="loading()">

    @if (phase() === ImportPhase.LOADING) {
      <div class="status-box" role="status" aria-live="polite">
        <div class="loader"></div>
        <p>Caricamento in corso…</p>
      </div>
    }

    @if (phase() === ImportPhase.ERROR) {
      <div class="error-box" role="alert" aria-live="assertive">
        <p>⚠️ Impossibile caricare il DIP.</p>
        <button class="retry-btn" (click)="onRetry()">Riprova</button>
      </div>
    }

    @if (phase() === ImportPhase.READY || phase() === ImportPhase.EMPTY) {
      <app-document-preview [node]="selectedDocument()"></app-document-preview>
    }

  </main>

</div>
