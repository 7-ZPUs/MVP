@if (state().phase === 'loading') {
  <div class="status-screen">Caricamento DIP...</div>
}

@if (state().phase === 'idle' && state().rootError; as rootError) {
  <div class="status-screen">
    <app-inline-error [error]="rootError"></app-inline-error>
    <button class="retry-button" type="button" (click)="retryLoadRootNodes()">Riprova</button>
  </div>
}

@if (state().phase === 'ready') {
  <header class="toolbar">
    <div class="title-block">
      <span class="title-kicker">Workspace Documentale</span>
      <h1 class="title">DIPReader</h1>
    </div>

    <nav class="toolbar-actions" aria-label="Navigazione principale">
      <button
        class="toolbar-button"
        [class.active]="isIntegrityActive()"
        type="button"
        (click)="navigateToIntegrity()"
        title="Verifica l'integrità dei documenti"
      >
        <span class="button-icon" aria-hidden="true">🛡️</span>
        <span class="button-text">Sezione Integrità</span>
      </button>
      <button
        class="toolbar-button"
        [class.active]="isBrowseActive()"
        type="button"
        (click)="navigateToBrowse()"
        title="Esplora i documenti"
      >
        <span class="button-icon" aria-hidden="true">📁</span>
        <span class="button-text">Esplora</span>
      </button>
      <button
        class="toolbar-button"
        [class.active]="isSearchActive()"
        type="button"
        (click)="navigateToSearch()"
        title="Ricerca avanzata"
      >
        <span class="button-icon" aria-hidden="true">🔍</span>
        <span class="button-text">Ricerca</span>
      </button>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar" [class.sidebar-collapsed]="isSidebarCollapsed()">
      <app-dip-tree [rootNodes]="rootNodes" (nodeSelected)="onNodeSelected($event)"></app-dip-tree>
    </aside>

    <button
      class="sidebar-toggle-tab"
      type="button"
      data-testid="dip-tree-toggle"
      aria-label="Mostra o nascondi albero"
      (click)="toggleSidebar()"
    >
      <span class="tab-arrow" [class.rotated]="isSidebarCollapsed()">◀</span>
      <span>Albero</span>
    </button>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
}
