<button
  class="result-card process-card"
  data-testid="search-result-card"
  type="button"
  tabindex="0"
  (click)="onSelectAction(result)"
>
  <i class="card-icon bi bi-gear" aria-hidden="true"></i>
  <div class="card-content">
    <h3 class="document-name" data-testid="search-result-title">
      {{ result.name || 'Processo senza titolo' }}
    </h3>
    <span class="document-id" data-testid="search-result-id">ID Processo: {{ result.uuid }}</span>
  </div>
  <div class="card-meta">
    <span class="badge process-badge">{{ result.type }}</span>
  </div>
  <span
    class="integrity-badge-base"
    data-testid="result-integrity-badge"
    [ngClass]="result.integrityStatus | integrityClass"
  >
    {{ result.integrityStatus }}
  </span>
</button>
