<div
  class="result-card process-card"
  data-testid="search-result-card"
  role="button"
  tabindex="0"
  (click)="onSelectAction(result)"
  (keydown.enter)="onSelectAction(result)"
  (keydown.space)="onSelectAction(result); $event.preventDefault()"
>
  <i class="card-icon bi bi-gear" aria-hidden="true"></i>
  <div class="card-content">
    <h3 class="document-name">{{ result.name || 'Processo senza titolo' }}</h3>
    <p class="document-id" data-testid="search-result-title">ID Processo: {{ result.uuid }}</p>
  </div>
  <div class="card-meta">
    <span class="badge process-badge">{{ result.type }}</span>
  </div>
  <span
    class="integrity-badge-base"
    data-testid="result-integrity-badge"
    [ngClass]="result.integrityStatus | integrityClass"
  >
    {{ result.integrityStatus }}
  </span>
</div>
