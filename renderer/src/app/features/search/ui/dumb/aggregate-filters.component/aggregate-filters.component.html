<fieldset [disabled]="disabled" class="filter-fieldset" [formGroup]="form">
  @if (disabled && disabledReason) {
    <div class="info-banner">
      <i class="bi bi-info-circle" aria-hidden="true"></i>
      {{ disabledReason }}
    </div>
  }

  <details class="filter-accordion" [attr.open]="getError('dataApertura') ? '' : null">
    <summary>Dati Aggregazione</summary>
    <div class="accordion-content">
      <div class="form-row">
        <div class="form-group">
          <label for="tipoAggregazione">Tipo Aggregazione</label>
          <select
            id="tipoAggregazione"
            data-testid="aggregation-type-select"
            formControlName="tipoAggregazione"
          >
            <option [ngValue]="null">Tutte</option>
            <option *ngFor="let t of aggregationTypes" [ngValue]="t">{{ t }}</option>
          </select>
        </div>
        <div class="form-group">
          <label for="idAggregazione">ID Aggregazione</label>
          <input
            id="idAggregazione"
            data-testid="aggregate-identifier-input"
            type="text"
            formControlName="idAggregazione"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="tipologiaFascicolo">Tipologia di Fascicolo</label>
          <select id="tipologiaFascicolo" formControlName="tipoFascicolo">
            <option [ngValue]="null">Tutte</option>
            <option *ngFor="let ft of fascicoloTypes" [ngValue]="ft">{{ ft }}</option>
          </select>
        </div>
        <div class="form-group">
          <label for="progressivoAggregazione">Progressivo Aggregazione</label>
          <input
            id="progressivoAggregazione"
            type="number"
            min="0"
            formControlName="progressivoAggregazione"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dataApertura">Data Apertura</label>
          <input
            id="dataApertura"
            type="date"
            formControlName="dataApertura"
            [attr.aria-invalid]="!!getError('dataApertura')"
          />
          <div *ngIf="getError('dataApertura') as err" class="validation-error">
            {{ err.message }}
          </div>
        </div>
        <div class="form-group">
          <label for="dataChiusura">Data Chiusura</label>
          <input id="dataChiusura" type="date" formControlName="dataChiusura" />
        </div>
      </div>
    </div>
  </details>

  <details class="filter-accordion" [attr.open]="hasProcedimentoFasiErrors() ? '' : null">
    <summary>Procedimento</summary>
    <div formGroupName="procedimento" class="accordion-content">
      <div class="form-row">
        <div class="form-group">
          <label for="materiaProcedimento">Materia</label>
          <input id="materiaProcedimento" type="text" formControlName="materia" />
        </div>
        <div class="form-group">
          <label for="uriCatalogo">Codice URI (Catalogo)</label>
          <input id="uriCatalogo" type="text" formControlName="URICatalogo" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="denomProcedimento">Denominazione Procedimento</label>
          <input id="denomProcedimento" type="text" formControlName="denominazioneProcedimento" />
        </div>
      </div>

      <div class="nested-section">
        <h5 class="nested-title">Fasi del Procedimento</h5>
        <div formArrayName="fasi">
          <div
            *ngFor="let fase of fasiFormArray.controls; let i = index"
            [formGroupName]="i"
            class="dynamic-form-item"
          >
            <button
              type="button"
              (click)="removeFase(i)"
              class="btn-remove-item"
              aria-label="Rimuovi fase"
            >
              <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>

            <div class="form-row">
              <div class="form-group">
                <label [for]="'tipoFase_' + i">Tipo Fase</label>
                <select [id]="'tipoFase_' + i" formControlName="tipoFase">
                  <option [ngValue]="null">Seleziona...</option>
                  <option *ngFor="let ft of faseTypes" [ngValue]="ft">{{ ft }}</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label [for]="'dataInizioFase_' + i">Inizio Fase</label>
                <input
                  [id]="'dataInizioFase_' + i"
                  type="date"
                  formControlName="dataInizioFase"
                  [attr.aria-invalid]="!!getFaseError(i, 'dataInizioFase')"
                />
                <div *ngIf="getFaseError(i, 'dataInizioFase') as err" class="validation-error">
                  {{ err.message }}
                </div>
              </div>
              <div class="form-group">
                <label [for]="'dataFineFase_' + i">Fine Fase</label>
                <input [id]="'dataFineFase_' + i" type="date" formControlName="dataFineFase" />
              </div>
            </div>
          </div>
        </div>
        <button type="button" (click)="addFase()" class="btn-outline">+ Aggiungi Fase</button>
      </div>
    </div>
  </details>

  <details class="filter-accordion" closed>
    <summary>Assegnazione</summary>
    <div formGroupName="assegnazione" class="accordion-content">
      <div class="form-row">
        <div class="form-group">
          <label for="tipoAssegnazione">Tipo Assegnazione</label>
          <select id="tipoAssegnazione" formControlName="tipoAssegnazione">
            <option [ngValue]="null">Tutte</option>
            <option *ngFor="let a of assegnazioneTypes" [ngValue]="a">{{ a }}</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="soggetto">Assegnazione</label>
          <input id="soggetto" type="text" formControlName="soggettoAssegn" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="dataInizioAssegn">Data Inizio</label>
          <input
            id="dataInizioAssegn"
            type="date"
            formControlName="dataInizioAssegn"
            [attr.aria-invalid]="!!getError('assegnazione.dataInizioAssegn')"
          />
          <div *ngIf="getError('assegnazione.dataInizioAssegn') as err" class="validation-error">
            {{ err.message }}
          </div>
        </div>
        <div class="form-group">
          <label for="dataFineAssegn">Data Fine</label>
          <input id="dataFineAssegn" type="date" formControlName="dataFineAssegn" />
        </div>
      </div>
    </div>
  </details>
</fieldset>
