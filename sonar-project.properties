# Identificazione del progetto
sonar.projectKey=dipreader
sonar.projectName=dipreader

# Sorgenti: core, renderer e shared (esclusi i test)
sonar.sources=core/src,renderer/src,shared,main.ts

# Test: core ha la propria cartella test separata; renderer mantiene i test in src
sonar.tests=core/test,renderer/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Esclusioni (fondamentali per non "sporcare" le metriche con librerie esterne)
sonar.exclusions=**/node_modules/**,**/dist/**,**/out/**,**/coverage/**,core/src/models/Xenova/**,**/*.json

# Linguaggio e percorsi dei file di configurazione TypeScript
sonar.typescript.tsconfigPaths=tsconfig.json,renderer/tsconfig.json

# --- METRICHE DI COVERAGE ---
# core  -> generato da Vitest (vitest run --coverage)
# renderer -> generato da ng test --coverage
sonar.javascript.lcov.reportPaths=coverage/core/lcov.info,coverage/renderer/lcov.info