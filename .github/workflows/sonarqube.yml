name: SonarQube Branch Analysis

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  sonarqube:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install
          cd core && npm install && cd ..
          cd renderer && npm install && cd ..

      - name: Prepare branch-scoped Sonar project key
        id: sonar_meta
        run: |
          BRANCH_SLUG="$(echo \"${GITHUB_REF_NAME}\" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._:-]/-/g')"
          echo "project_key=dipreader:${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "project_name=dipreader (${GITHUB_REF_NAME})" >> "$GITHUB_OUTPUT"

      - name: SonarQube Analysis (community branch workaround)
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ steps.sonar_meta.outputs.project_key }}
            -Dsonar.projectName=${{ steps.sonar_meta.outputs.project_name }}
