name: SonarQube Branch Project Cleanup

"on":
  delete:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name to cleanup (optional manual override)"
        required: false
        type: string

jobs:
  cleanup:
    if: github.event.ref_type == 'branch' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted

    steps:
      - name: Resolve branch name
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ github.event.inputs.branch_name || '' }}"

          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="${{ github.event.ref || '' }}"
          fi

          if [ -z "$BRANCH_NAME" ]; then
            echo "No branch name resolved; nothing to clean."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute Sonar project key
        if: steps.branch.outputs.skip != 'true'
        id: sonar
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_SLUG="$(echo "${{ steps.branch.outputs.branch_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._:-]/-/g')"
          echo "project_key=dipreader:${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"

      - name: Delete branch project in SonarQube (if exists)
        if: steps.branch.outputs.skip != 'true'
        shell: bash
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: ${{ steps.sonar.outputs.project_key }}
        run: |
          set -euo pipefail

          STATUS_CODE="$(curl -sS -o /tmp/sonar_delete_response.txt -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            -X POST "${SONAR_HOST_URL}/api/projects/delete" \
            --data-urlencode "project=${PROJECT_KEY}")"

          if [ "$STATUS_CODE" = "204" ]; then
            echo "Deleted SonarQube project: ${PROJECT_KEY}"
            exit 0
          fi

          if [ "$STATUS_CODE" = "404" ]; then
            echo "Project not found (already deleted): ${PROJECT_KEY}"
            exit 0
          fi

          echo "Failed to delete SonarQube project: ${PROJECT_KEY} (HTTP ${STATUS_CODE})"
          cat /tmp/sonar_delete_response.txt || true
          exit 1
